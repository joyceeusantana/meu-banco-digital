<!doctype html>
<html class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu App Financeiro</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body class="h-full">
  <div id="registration-screen" class="h-full w-full bg-[#0a0e1a] flex flex-col items-center justify-center px-6">
    <div class="w-full max-w-sm space-y-8">
      <div class="text-center">
        <h2 class="text-3xl font-bold text-emerald-400">Seja bem-vindo</h2>
        <p class="text-gray-400 mt-2">Digite seu nome para acessar sua conta</p>
      </div>
      <div class="space-y-4">
        <input type="text" id="user-input" placeholder="Nome Completo" 
               class="w-full p-4 rounded-xl bg-[#111827] border border-gray-800 text-white focus:border-emerald-500 outline-none transition">
        <button id="btn-register" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-[#0a0e1a] font-bold rounded-xl transition shadow-lg shadow-emerald-500/20">
          Entrar no Banco
        </button>
      </div>
    </div>
  </div>

  <div id="transition-screen" class="h-full w-full bg-[#0a0e1a] flex flex-col items-center justify-center px-6 hidden">
    <div class="text-center animate-fade-in">
      <h2 id="prosperity-message" class="text-2xl md:text-3xl font-medium text-white leading-relaxed"></h2>
      <div class="mt-6 flex justify-center">
        <div class="w-12 h-1 bg-emerald-500 rounded-full animate-loading-bar"></div>
      </div>
    </div>
  </div>

  <div id="app-content" class="h-full w-full bg-[#0a0e1a] text-white overflow-auto hidden">
    <div class="px-6 pt-8 pb-4 flex items-center justify-between">
      <div>
        <p class="text-sm text-gray-400">Olá,</p>
        <p id="account-name" class="text-lg font-semibold"></p>
      </div>
      <div id="user-initials" class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center font-bold text-sm"></div>
    </div>

    <div class="mx-6 mt-4 p-6 rounded-2xl bg-gradient-to-br from-[#111827] to-[#1a2332] border border-gray-800">
      <div class="flex items-center gap-2 mb-2">
        <p class="text-sm text-gray-400">Saldo disponível</p>
        <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot inline-block"></span>
      </div>
      <p id="balance" class="text-4xl font-bold text-emerald-400 balance-glow tracking-tight">R$ 0,00</p>
      <p id="gain" class="text-xs text-emerald-300 mt-2 opacity-70">+R$ 0,00 desde que você abriu</p>
    </div>

    <div class="grid grid-cols-4 gap-3 px-6 mt-8">
      <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-[#111827] border border-gray-800 hover:border-emerald-700 transition">
        <i data-lucide="arrow-up-right" class="w-5 h-5 text-emerald-400"></i>
        <span class="text-[11px] text-gray-300">Pix</span>
      </button>
      <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-[#111827] border border-gray-800 hover:border-emerald-700 transition">
        <i data-lucide="qr-code" class="w-5 h-5 text-emerald-400"></i>
        <span class="text-[11px] text-gray-300">Cobrar</span>
      </button>
      <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-[#111827] border border-gray-800 hover:border-emerald-700 transition">
        <i data-lucide="credit-card" class="w-5 h-5 text-emerald-400"></i>
        <span class="text-[11px] text-gray-300">Cartão</span>
      </button>
      <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-[#111827] border border-gray-800 hover:border-emerald-700 transition">
        <i data-lucide="bar-chart-3" class="w-5 h-5 text-emerald-400"></i>
        <span class="text-[11px] text-gray-300">Investir</span>
      </button>
    </div>

    <div class="px-6 mt-8 pb-8">
      <h2 class="text-sm font-semibold text-gray-400 mb-4">Últimas movimentações</h2>
      <div class="space-y-3">
        <div class="flex items-center justify-between p-3 rounded-xl bg-[#111827] border border-gray-800">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-emerald-900/50 flex items-center justify-center">
              <i data-lucide="arrow-down-left" class="w-4 h-4 text-emerald-400"></i>
            </div>
            <div>
              <p class="text-sm font-medium">Rendimento CDI</p>
              <p class="text-xs text-gray-500">Hoje</p>
            </div>
          </div>
          <p class="text-sm text-emerald-400 font-medium">+R$ 3,42</p>
        </div>
        <div class="flex items-center justify-between p-3 rounded-xl bg-[#111827] border border-gray-800">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-red-900/30 flex items-center justify-center">
              <i data-lucide="arrow-up-right" class="w-4 h-4 text-red-400"></i>
            </div>
            <div>
              <p class="text-sm font-medium">Pix - Maria</p>
              <p class="text-xs text-gray-500">Ontem</p>
            </div>
          </div>
          <p class="text-sm text-red-400 font-medium">-R$ 85,00</p>
        </div>
        <div class="flex items-center justify-between p-3 rounded-xl bg-[#111827] border border-gray-800">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-emerald-900/50 flex items-center justify-center">
              <i data-lucide="arrow-down-left" class="w-4 h-4 text-emerald-400"></i>
            </div>
            <div>
              <p class="text-sm font-medium">Transferência recebida</p>
              <p class="text-xs text-gray-500">22 Mai</p>
            </div>
          </div>
          <p class="text-sm text-emerald-400 font-medium">+R$ 2.500,00</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
